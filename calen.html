<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Códice de Walingardyn - Compacto</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <style>
        :root { --ouro: #b38728; --bg: #050505; }

        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        .viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mecanismo {
            position: relative;
            width: 700px;
            height: 700px;
        }

        .disco {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-size: cover;
            background-position: center;
            transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow:
                inset 0 0 40px rgba(0,0,0,0.8),
                inset 0 0 80px rgba(0,0,0,0.6);
        }

       /* DISCOS COM CAMINHO PARA A PASTA DETALHES */
        #d1 {
            width: 700px;
            height: 700px;
            background-image: url('detalhes/pedra.jpg'), url('detalhes/disco1.png');
            background-blend-mode: multiply;
            z-index: 1;
        }

        #mv {
            width: 500px;
            height: 500px;
            background-image: url('detalhes/pedra.jpg'), url('detalhes/mavules.png');
            background-blend-mode: overlay;
            opacity: 0.2;
            pointer-events: none;
            z-index: 2;
        }

        #d2 {
            width: 500px;
            height: 500px;
            background-image: url('detalhes/pedra.jpg'), url('detalhes/disco2.png');
            background-blend-mode: multiply;
            z-index: 3;
        }

        #d3 {
            width: 300px;
            height: 300px;
            background-image: url('detalhes/pedra.jpg'), url('detalhes/disco3.png');
            background-blend-mode: multiply;
            z-index: 5;
        }
        /* CARDS */
        .card-no-disco {
            position: absolute;
            width: 40px;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--ouro);
            left: 50%; top: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .card-no-disco img {
            width: 80%;
            height: 55%;
            object-fit: contain;
            filter: sepia(0.4);
        }

        .card-no-disco span {
            font-size: 7px;
            color: var(--ouro);
            text-align: center;
            margin-top: 2px;
            font-weight: bold;
        }

        /* PAINEL LATERAL */
        .painel {
            width: 320px;
            background: #080808;
            border-left: 2px solid var(--ouro);
            transform: translateX(100%);
            transition: 0.6s ease;
            z-index: 100;
        }

        .painel.active { transform: translateX(0); }

        /* BANNER COM IMAGEM REAL */
        .banner {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--ouro);
        }
/* --- CSS CORRIGIDO PARA POSICIONAMENTO DA IMAGEM --- */
        .banner img {
            width: 100%;            /* Ocupa toda a largura da div pai */
            height: 100%;           /* Ocupa toda a altura (180px) da div pai */
            object-fit: cover;      /* Cobre a div sem distorcer, cortando o excesso */
            display: block;

            /* ESTA É A PROPRIEDADE CHAVE PARA O SEU POSICIONAMENTO: */
            object-position: 50% 50%; /* Alinha horizontalmente no centro (50%) */
                                      /* e verticalmente 20% do topo para baixo. */
                                      /* Aumente o 20% para baixar a imagem, diminua para subir. */
        }
        /* --- FIM DO CSS CORRIGIDO --- */
        /* EFEITO DRAMÁTICO */
        .banner::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, #080808);
        }

        .info {
            padding: 20px;
        }

        .info h2 {
            color: #fcf6ba;
            margin: 15px 0 10px 0;
            font-size: 1.2em;
            text-transform: uppercase;
        }

       .info p {
    color: #ccc;
    line-height: 1.6; /* Aumentado para melhor leitura */
    font-size: 13px;
    text-transform: uppercase;
    white-space: pre-wrap; /* Mantém as quebras de linha do JavaScript */
}

        .btn-fechar {
    position: absolute; /* Isso faz o botão "flutuar" sobre a imagem */
    top: 10px;          /* Distância do topo */
    right: 10px;        /* Distância da direita */
    color: var(--ouro);
    cursor: pointer;
    z-index: 110;       /* Garante que ele fique na frente da foto */
}


/* Painel de Curiosidades (Esquerda) */
.painel-curiosidades {
    position: absolute;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    background: linear-gradient(to right, #080808, transparent);
    border-right: 1px solid rgba(179, 135, 40, 0.3);
    padding: 40px 20px;
    box-sizing: border-box;
    transform: translateX(-100%); /* Escondido por padrão */
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 90;
}

.painel-curiosidades.active {
    transform: translateX(0);
}

.painel-curiosidades h3 {
    color: var(--ouro);
    font-size: 14px;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--ouro);
    padding-bottom: 5px;
    margin-bottom: 20px;
}

.painel-curiosidades p {
    color: #888;
    font-size: 12px;
    line-height: 1.8;
    font-style: italic;
}

/* Widget de Música */
.music-box {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.6);
    padding: 8px 15px;
    border: 1px solid var(--ouro);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.music-box:hover {
    background: rgba(179, 135, 40, 0.2);
}

.music-box span {
    font-size: 10px;
    color: var(--ouro);
}

    </style>
</head>
<body>

<aside class="painel-curiosidades" id="aba-curiosidades">
    <h3>CURIOSIDADES DA ERA</h3>
    <p id="texto-curiosidade">Os segredos do tempo serão revelados ao selecionar uma era no mecanismo...</p>
</aside>

<div class="music-box" onclick="toggleMute()">
    <span id="music-status">♫ MUSIC: OFF</span>
    <audio id="audio-tema" loop>
        <source src="acp.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="viewport">
    <div class="mecanismo">
        <div class="disco" id="d1"></div>
        <div class="disco" id="mv"></div>
        <div class="disco" id="d2"></div>
        <div class="disco" id="d3"></div>
    </div>
</div>

<aside class="painel" id="painel">
    <div class="btn-fechar" onclick="fechar()">[ FECHAR ]</div>

    <div class="banner">
        <img id="p-foto" src="" alt="">
    </div>

    <div class="info">
        <h2 id="p-tit"></h2>
        <p id="p-desc"></p>
    </div>
</aside>

<script>

const eras = [
    { 
        nome: "I Era Imperial", 
        img: "detalhes/hn.png", 
        disco: "d1", 
        ang: 0, 
        raio: 300,
        descricao: "Haragum e seu irmão Nabulork são escolhidos dentre o panteão para governar juntos o mundo de Walingardyn. A maldição dos perdidos atinge Nabulork e o converte ao lado escuro do poder. Nabulork investe contra o irmão dando início à formulação da magia profunda a partir do poder dos deuses. Haragum tenta salvá-lo criando algo chamado Cristal de Nabulork, mas na verdade consegue apenas prender o irmão e a magia no cristal.",
        curiosidade: "Diz-se que o cristal de Nabulork emite um zumbido imperceptível aos humanos, mas que atrai criaturas das sombras."
    },
    { 
        nome: "II Era Imperial", 
        img: "detalhes/lou.png", 
        disco: "d1", 
        ang: 120, 
        raio: 300,
        descricao: "Uma batalha de 400 anos foi travada e vencida pela luz. Haragum cria os primeiros seres mágicos primitivos. A humanidade é criada 70 anos de Era depois. A humanidade aprende o manuseio da magia e começa a usar os conhecimentos ao seu próprio benefício. Haragum volta ao primeiro céu carregando consigo o manto do poder e seu cajado de luz quebrado e Nabulork fica em Walingardyn. Um navio de um império distante desembarca no continente 63 anos de Era depois, portando uma família real, dois reis, (Haniseff & Matthwel), acreditavam se tratar de terras pobres ao princípio, com o passar do tempo foram firmando as bases e construíram o primeiro reino. (reino de Araldean)",
        curiosidade: "O cajado de luz de Haragum, embora quebrado, ainda é capaz de iluminar todo o continente se banhado em águas puras."
    },
    { 
        nome: "III Era Imperial", 
        img: "detalhes/sercgh.png", 
        disco: "d1", 
        ang: 240, 
        raio: 300,
        descricao: "Sob a ajuda invisível de Nabulork, Haniseff conheceu os poderes dos antigos seres em uma expedição mata adentro. Por influência da magia obscura, decidiu escravizar estes seres e ordenou aos seus homens que deles extraíssem toda a magia que pudessem. A magia se voltou contra aqueles que juraram a proteger, a humanidade perdeu os dias de glória Haragunica e entrou no período das trevas.",
        curiosidade: "A família real Haniseff mantinha os seres mágicos em jaulas feitas de um metal que anulava qualquer tentativa de teletransporte."
    },
    { 
        nome: "Era das Trevas", 
        img: "detalhes/serg.png", 
        disco: "d2", 
        ang: 0, 
        raio: 200,
        descricao: "O medo, mortes e fome começam a se alastrar pelo vasto continente de Triohnte. A realityade da coroa tomada pela maldade vem à tona, diversas alianças em escala continental são formadas e os lordes buscam a todo custo manter a soberania de suas casas em uma fortificação forjada a favor da monarquia O Parlamento de Linowland com o apoio do exército capital, executam a Ordem da Coroa (Um conchavo criado a fim de promover ideias revolucionárias anti-monarquistas no continente e fora dele). Hoklamoh Askarung, General superior do exército capital, ordena centenas de prisões aos lordes que se opunham. Depois, executam emboscadas contra o imperador, tomam palácios e fortes. Ganham força durante um tempo.",
        curiosidade: "A Ordem da Coroa utilizava corvos treinados para trocar mensagens codificadas entre as casas rebeldes."
    },
    { 
        nome: "Era de Bronze", 
        img: "detalhes/lopp.png", 
        disco: "d2", 
        ang: 180, 
        raio: 200,
        descricao: "Agaroff invoca o Conselho de Esguardian que envia soldados espalhados por todo o mundo para Triohnte. Juntos conseguem contra-atacar e tomar o poder do continente de volta em suas mãos. O cenário é de completa destruição e desolo. Líderes anti-monarquistas são presos e torturados até a morte.",
        curiosidade: "O bronze desta era era fundido com poeira estelar, o que dava às armaduras uma resistência sobrenatural contra magia negra."
    },
    { 
        nome: "Era Profética", 
        img: "detalhes/putli.png", 
        disco: "d3", 
        ang: 0, 
        raio: 0,
        descricao: "As visões que moldarão o futuro do mundo.",
        curiosidade: "Muitos acreditam que as profecias não são sobre o futuro, mas sim lembranças de um ciclo que já aconteceu milhares de vezes."
    }
];

eras.forEach(era => {
    const discoPai = document.getElementById(era.disco);
    const card = document.createElement('div');
    card.className = 'card-no-disco';

    const rad = (era.ang - 90) * (Math.PI / 180);
    const x = Math.cos(rad) * era.raio;
    const y = Math.sin(rad) * era.raio;

    card.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${era.ang}deg)`;
    card.innerHTML = `<img src="${era.img}"><span>${era.nome}</span>`;

    card.onclick = (e) => {
        e.stopPropagation();
        
        // Gira o mecanismo
        discoPai.style.transform = `translate(-50%, -50%) rotate(${-era.ang}deg)`;

        // Atualiza Painel Direito (Informações)
        document.getElementById('p-tit').innerText = era.nome;
        document.getElementById('p-desc').innerText = era.descricao;
        const foto = document.getElementById('p-foto');
        foto.src = era.img;
        foto.style.display = "block";
        document.getElementById('painel').classList.add('active');

        // ATUALIZA PAINEL ESQUERDO (Curiosidades)
        document.getElementById('texto-curiosidade').innerText = era.curiosidade;
        document.getElementById('aba-curiosidades').classList.add('active');
    };

    discoPai.appendChild(card);
});

function fechar() {
    // Fecha ambos os painéis
    document.getElementById('painel').classList.remove('active');
    document.getElementById('aba-curiosidades').classList.remove('active');
}

function toggleMute() {
    const audio = document.getElementById('audio-tema');
    const status = document.getElementById('music-status');
    
    if (audio.paused) {
        audio.play().catch(e => console.log("O navegador bloqueou o autoplay. Clique novamente."));
        status.innerText = "♫ MUSIC: ON";
    } else {
        audio.pause();
        status.innerText = "♫ MUSIC: OFF";
    }
}
</script>

</body>
</html>
